<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digna's 70th Birthday Invitation · Cover</title>
  <meta name="description" content="A refined crystal ruby digital birthday invitation for Digna's 70th birthday celebration." />
  <meta name="theme-color" content="#260009" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Playfair+Display:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="front-page">
  <div class="scene" aria-hidden="true">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <div class="particle-layer" id="particleLayer"></div>
  </div>

  <main class="invitation-shell">
    <!-- SEPARATED FRONT COVER: original design preserved, CTA links to invitation.html -->
    <section class="cover-screen" id="cover">
      <div class="cover-card invitation-panel tilt-card" data-tilt>
        <div class="inner-glow"></div>

        <div class="cover-ornament">
          <span></span>
          <i>✦</i>
          <span></span>
        </div>

        <div class="crown" aria-hidden="true">♛</div>
        <p class="eyebrow">A Grand Celebration</p>

        <h1 class="script-name">Digna’s</h1>

        <div class="milestone" aria-label="70th Birthday">
          <span class="number">70</span><span class="suffix">th</span>
        </div>

        <p class="birthday-label">Birthday</p>

        <div class="tiny-sparkle" aria-hidden="true">✧</div>

        <p class="cover-copy">
          You are warmly invited to join us<br />
          in this very special milestone.
        </p>

        <p class="cover-date">August 8, 2026 · 3:00 PM</p>
      </div>

      <a class="open-invitation magnetic" id="openInvitation" href="invitation.html">
        <span>✉</span> Open Invitation
      </a>

      <p class="tap-note">Tap to open the official invitation</p>
    </section>
  </main>

  <div class="open-transition" id="openTransition" aria-hidden="true">
    <div class="open-transition-card">
      <div class="open-seal">70</div>
      <p>Opening Invitation</p>
    </div>
  </div>

  <script src="js/front.js"></script>
</body>
</html>
